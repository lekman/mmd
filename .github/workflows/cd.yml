# Publish to npm, GitHub Packages, and VS Code Marketplace when a release is published.
# Triggered by release-please creating a GitHub release, or manually via workflow_dispatch.
#
# Required secrets:
#   NPM_TOKEN  — npm access token with publish permission for @lekman scope
#   VSCE_PAT   — VS Code Marketplace Personal Access Token (publisher: lekman)

name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (leave empty to use latest release)"
        required: false
        type: string

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Configure npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > .npmrc

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public 2>&1 | tee publish.log || {
            if grep -q "You cannot publish over the previously published versions" publish.log; then
              echo "::notice::Version already exists on npm, skipping"
            else
              cat publish.log
              exit 1
            fi
          }

  publish-vsix:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: cd vsix && bun install

      - name: Build extension
        run: cd vsix && bun esbuild.mjs --minify

      - name: Package and publish
        run: cd vsix && npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Configure GitHub Packages registry
        run: |
          echo "@lekman:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --access public 2>&1 | tee publish.log || {
            if grep -qE "(already exists|EPUBLISHCONFLICT|cannot publish over)" publish.log; then
              echo "::notice::Version already exists on GitHub Packages, skipping"
            else
              cat publish.log
              exit 1
            fi
          }
