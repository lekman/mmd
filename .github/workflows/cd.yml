# Publish to npm and VS Code Marketplace when a release is published.
# Triggered by release-please creating a GitHub release, or manually via workflow_dispatch.
#
# npm publishing uses Trusted Publishing (OIDC) — no long-lived token. Configured at
# npmjs.com under the package's Settings → Trusted Publishers, scoped to this repo and
# this workflow file (cd.yml).
#
# Required secrets:
#   VSCE_PAT   — VS Code Marketplace Personal Access Token (publisher: lekman)

name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (leave empty to use latest release)"
        required: false
        type: string

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: Production   # required by npmjs.com Trusted Publisher policy
    permissions:
      contents: read    # checkout the release tag
      id-token: write   # mint OIDC token for npm Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing
        # Trusted Publishing was added in npm 11.5.1. Node 22 ships with
        # npm 10.x, which can sign provenance but cannot authenticate the
        # publish itself via OIDC — the registry then rejects with an
        # opacity 404. Pin npm to the latest release to enable OIDC auth.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish to npm with provenance
        run: |
          npm publish --access public --provenance 2>&1 | tee publish.log || {
            if grep -q "You cannot publish over the previously published versions" publish.log; then
              echo "::notice::Version already exists on npm, skipping"
            else
              cat publish.log
              exit 1
            fi
          }

  publish-vsix:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: cd vsix && bun install

      - name: Build extension
        run: cd vsix && bun esbuild.mjs --minify

      - name: Package and publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd vsix
          npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT" 2>&1 | tee publish.log || {
            if grep -qiE "already exists" publish.log; then
              echo "::notice::Version already exists on VS Code Marketplace, skipping"
            else
              cat publish.log
              exit 1
            fi
          }

