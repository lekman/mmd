<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 423.70000000000005 384" width="383.70000000000005" height="344" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)"><rect x="-20" y="-20" width="423.70000000000005" height="384" rx="10" ry="10" fill="#ffffff" stroke="#cccccc" stroke-width="1"/><g transform="translate(0,0)">
<style>
