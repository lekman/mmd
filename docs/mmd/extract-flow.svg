<text x="206.15" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Scan .md files for mermaid fenced blocks</text>
<text x="206.15" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Generate name from file path + block index</text>
